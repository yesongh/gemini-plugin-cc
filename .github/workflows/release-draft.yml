name: release-draft

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  draft:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump canonical version
        id: bump
        run: |
          pnpm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version across manifests
        run: pnpm run version:sync

      - name: Verify versions agree
        run: pnpm run version:check

      - name: Run full CI suite
        run: pnpm run ci

      - name: Generate CHANGELOG entry
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: node scripts/generate-changelog.mjs

      - name: Ensure release label exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh label create release \
            --color 0E8A16 \
            --description "Release PR" \
            --force

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md package.json \
            .claude-plugin/marketplace.json \
            plugins/gemini/.claude-plugin/plugin.json
          git commit -m "chore(release): v${VERSION}"
          git push origin "$BRANCH"

          node scripts/extract-latest-changelog.mjs > .pr-body.md
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${VERSION}" \
            --label release \
            --body-file .pr-body.md
